openapi: 3.0.3
info:
  title: LeanStock Final API
  version: 1.0.0
  description: Complete API contract for LeanStock backend.
servers:
   - url: https://leanstock-final-production.onrender.com/api/v1
   - url: http://localhost:3000/api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Products
  - name: Locations
  - name: Inventory
  - name: Transfers
  - name: Reservations
  - name: Sales
  - name: Forecasts
  - name: Audit Logs
  - name: Jobs

paths:
  /auth/register-owner:
    post:
      tags: [Auth]
      security: []
      summary: Register tenant owner
      requestBody:
        required: true
        content:
          application/json:
            example:
              tenantName: "Almaty Mini Market"
              fullName: "Alisher Owner"
              email: "owner@example.com"
              password: "StrongPass123"
      responses:
        "201": { description: Registration created }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/verify-email:
    post:
      tags: [Auth]
      security: []
      summary: Verify email by code
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: "owner@example.com"
              code: "123456"
      responses:
        "200": { description: Email verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: "owner@example.com"
              password: "StrongPass123"
      responses:
        "200": { description: JWT tokens returned }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh token rotation
      requestBody:
        required: true
        content:
          application/json:
            example:
              refreshToken: "refresh.jwt.token"
      responses:
        "200": { description: New tokens returned }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      responses:
        "204": { description: Logged out }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/forgot-password:
    post:
      tags: [Auth]
      security: []
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: "owner@example.com"
      responses:
        "200": { description: Reset instructions queued }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/reset-password:
    post:
      tags: [Auth]
      security: []
      summary: Reset password by email code
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: "owner@example.com"
              code: "123456"
              newPassword: "NewStrong123"
      responses:
        "200": { description: Password reset }
        "400": { $ref: "#/components/responses/BadRequest" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users:
    get:
      tags: [Users]
      summary: List tenant users
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { description: User list }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/ServerError" }
    post:
      tags: [Users]
      summary: Invite user
      requestBody:
        required: true
        content:
          application/json:
            example:
              fullName: "Dana Manager"
              email: "manager@example.com"
              password: "Manager123"
              role: "MANAGER"
      responses:
        "201": { description: User created }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /products:
    get:
      tags: [Products]
      summary: List products with cursor pagination
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { name: search, in: query, schema: { type: string } }
      responses:
        "200": { description: Product list }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/ServerError" }
    post:
      tags: [Products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            example:
              sku: "RICE-5KG"
              name: "Rice 5kg"
              category: "Groceries"
              costPrice: 3200
              sellingPrice: 4200
              minimumPrice: 3500
              leadTimeDays: 7
              safetyStock: 10
      responses:
        "201": { description: Product created }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Product }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Products]
      summary: Update product
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Updated product }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Products]
      summary: Archive product
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Product archived }

  /locations:
    get:
      tags: [Locations]
      summary: List locations
      responses:
        "200": { description: Location list }
    post:
      tags: [Locations]
      summary: Create location
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: "Shop A"
              address: "Almaty, Abay 10"
      responses:
        "201": { description: Location created }

  /inventory/stocks:
    get:
      tags: [Inventory]
      summary: List stock
      parameters:
        - { name: locationId, in: query, schema: { type: string, format: uuid } }
        - { name: productId, in: query, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Stock list }

  /inventory/receive:
    post:
      tags: [Inventory]
      summary: Receive stock
      requestBody:
        required: true
        content:
          application/json:
            example:
              productId: "11111111-1111-1111-1111-111111111111"
              locationId: "22222222-2222-2222-2222-222222222222"
              quantity: 100
              note: "Supplier delivery"
      responses:
        "201": { description: Stock received }

  /transfers:
    post:
      tags: [Transfers]
      summary: Atomic inventory transfer with Redis lock and Prisma transaction
      requestBody:
        required: true
        content:
          application/json:
            example:
              productId: "11111111-1111-1111-1111-111111111111"
              sourceLocationId: "22222222-2222-2222-2222-222222222222"
              destinationLocationId: "33333333-3333-3333-3333-333333333333"
              quantity: 10
      responses:
        "201": { description: Transfer completed }
        "409": { $ref: "#/components/responses/Conflict" }

  /reservations:
    post:
      tags: [Reservations]
      summary: Create Redis-locked checkout reservation
      requestBody:
        required: true
        content:
          application/json:
            example:
              locationId: "22222222-2222-2222-2222-222222222222"
              items:
                - productId: "11111111-1111-1111-1111-111111111111"
                  quantity: 2
      responses:
        "201": { description: Reservation created }

  /reservations/{id}/cancel:
    post:
      tags: [Reservations]
      summary: Cancel reservation
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Reservation cancelled }

  /sales:
    get:
      tags: [Sales]
      summary: List sales
      responses:
        "200": { description: Sale list }

  /sales/confirm:
    post:
      tags: [Sales]
      summary: Confirm reservation and create sale
      requestBody:
        required: true
        content:
          application/json:
            example:
              reservationId: "44444444-4444-4444-4444-444444444444"
      responses:
        "201": { description: Sale created }

  /forecasts/reorder:
    get:
      tags: [Forecasts]
      summary: Reorder recommendations
      parameters:
        - { name: locationId, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: days, in: query, schema: { type: integer, enum: [7, 14, 30] } }
      responses:
        "200": { description: Recommendations }

  /audit-logs:
    get:
      tags: [Audit Logs]
      summary: List audit logs
      responses:
        "200": { description: Audit logs }

  /jobs/dead-stock/run:
    post:
      tags: [Jobs]
      summary: Manually enqueue dead stock decay job
      responses:
        "202": { description: Job queued }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
    Cursor:
      name: cursor
      in: query
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          example:
            error:
              code: BAD_REQUEST
              message: Quantity must be greater than zero
              details: {}
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          example:
            error:
              code: UNAUTHORIZED
              message: Missing Bearer token
              details: {}
    Forbidden:
      description: Forbidden
      content:
        application/json:
          example:
            error:
              code: FORBIDDEN
              message: Your role cannot perform this action
              details: {}
    NotFound:
      description: Not found
      content:
        application/json:
          example:
            error:
              code: NOT_FOUND
              message: Resource not found
              details: {}
    Conflict:
      description: Conflict
      content:
        application/json:
          example:
            error:
              code: CONFLICT
              message: Insufficient available stock
              details:
                available: 2
                requested: 5
    ValidationError:
      description: Validation error
      content:
        application/json:
          example:
            error:
              code: VALIDATION_ERROR
              message: Invalid request data
              details: {}
    ServerError:
      description: Server error
      content:
        application/json:
          example:
            error:
              code: INTERNAL_SERVER_ERROR
              message: Unexpected server error
              details: {}
